services:
  - type: web
    name: japaneseapp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node app.js
    plan: free
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"
